<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Teachable Machine + p5.js</title>

  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>


  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
    }
    canvas {
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <h2>Teachable Machine (p5.js)</h2>

  <script>
    let classifier;
    let video;
    let label = "Loading model...";
    let confidence = 0;

    const modelURL = "/";

    function preload() {
      classifier = ml5.imageClassifier(modelURL);
    }

    function setup() {
      createCanvas(320, 260);

      video = createCapture(VIDEO);
      video.size(320, 240);
      video.hide();

      classifyVideo();
    }

    function draw() {
      background(0);

      image(video, 0, 0);

      fill(255);
      textSize(18);
      textAlign(CENTER);

      text(label, width / 2, height - 40);
      text("Confidence: " + nf(confidence * 100, 2, 2) + "%", width / 2, height - 15);
    }

    function classifyVideo() {
      classifier.classify(video, gotResult);
    }

    function gotResult(error, results) {
      if (error) {
        console.error(error);
        return;
      }

      label = results[0].label;
      confidence = results[0].confidence;

      classifyVideo(); 
    }
  </script>
</body>
</html>
